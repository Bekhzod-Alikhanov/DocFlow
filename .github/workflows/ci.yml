name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --strict)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage (engine ≥90%)
        run: npm run coverage

      - name: Build
        run: npm run build
